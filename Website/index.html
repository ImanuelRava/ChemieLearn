<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemieLearn</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Georgia", serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      max-width: 100%;
      height: 60px;
      background-color: #f1f1f1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    
    header img {
      height: 40px;
    }
    
    header nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }
    
    header nav a {
      margin: 5px;
      text-decoration: none;
      color: #333;
    }
    
    main {
      flex: 1;
      display: flex;
    }
    
    section {
      width: calc(100vw / 4);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #fff;
      border: 4px solid #fff;
    }
    
    #section1 {
      background-color: #ff6f69;
    }
    
    #section2 {
      background-color: #3caea3;
    }
    
    #section3 {
      background-color: #f6d55c;
    }

    #section4 {
      background-color: #808080;
    }
    
    footer {
      background-color: #f1f1f1;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <header>
    <img src="Logo.png" alt="Website Logo">
  </header>

  <main>
    <section id="section1">
      <h2 style="text-align: center;">Physical Chemistry</h2>
    </section>

    <section id="section2">
      <h2 style="text-align: center;">Organic Chemistry</h2>
    </section>

    <section id="section3">
      <h2 style="text-align: center;">Inorganic Chemistry</h2>
    </section>

    <section id="section4">
      <h2 style="text-align: center;">Analytical Chemistry</h2>
    </section>
  </main>

  <footer>
    &copy; 2024 ChemieLearn. All rights reserved.
  </footer>
</body>
</html>
